<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" ry="96" fill="#f5f0e8"/>
  <g transform="translate(256,256)">
    <!-- Brain outline (left hemisphere) -->
    <path d="M-20,-120 C-80,-120 -130,-80 -130,-20 C-130,0 -120,20 -105,35 C-120,55 -115,85 -95,105 C-75,125 -45,130 -20,120"
          fill="none" stroke="#c96442" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brain outline (right hemisphere) -->
    <path d="M20,-120 C80,-120 130,-80 130,-20 C130,0 120,20 105,35 C120,55 115,85 95,105 C75,125 45,130 20,120"
          fill="none" stroke="#c96442" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Brain center line -->
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#c96442" stroke-width="12" stroke-linecap="round"/>
    <!-- Brain folds left -->
    <path d="M-10,-60 C-50,-55 -70,-30 -60,0" fill="none" stroke="#c96442" stroke-width="12" stroke-linecap="round"/>
    <path d="M-10,20 C-50,30 -65,55 -50,80" fill="none" stroke="#c96442" stroke-width="12" stroke-linecap="round"/>
    <!-- Brain folds right -->
    <path d="M10,-60 C50,-55 70,-30 60,0" fill="none" stroke="#c96442" stroke-width="12" stroke-linecap="round"/>
    <path d="M10,20 C50,30 65,55 50,80" fill="none" stroke="#c96442" stroke-width="12" stroke-linecap="round"/>
    <!-- Lightning bolt -->
    <polygon points="-8,95 15,140 2,140 12,175 -18,130 -4,130 -8,95" fill="#c96442"/>
  </g>
</svg>
